databases:
  - name: mailzilla-db
    databaseName: mailzilla
    user: mailzilla
    plan: free

services:
  - type: web
    name: mailzilla-api
    runtime: ruby
    plan: free
    buildCommand: bundle install && bundle exec rake db:migrate && bundle exec rake db:seed
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_SKIP_ASSET_COMPILATION
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: mailzilla-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SECRET_KEY_BASE
        sync: false
